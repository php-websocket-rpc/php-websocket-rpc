version: 2

updates:
    - package-ecosystem: 'npm'
      directory: '/'
      schedule:
          interval: 'weekly'
      commit-message:
          prefix: 'chore(deps)'
      groups:
          npm-dev:
              dependency-type: 'development'
              update-types:
                  - 'minor'
                  - 'patch'
          npm-prod:
              dependency-type: 'production'
              update-types:
                  - 'minor'
                  - 'patch'

    - package-ecosystem: 'composer'
      directory: '/'
      schedule:
          interval: 'weekly'
      commit-message:
          prefix: 'chore(deps)'
      groups:
          composer-dev:
              dependency-type: 'development'
              update-types:
                  - 'minor'
                  - 'patch'
          composer-prod:
              dependency-type: 'production'
              update-types:
                  - 'minor'
                  - 'patch'

    - package-ecosystem: 'github-actions'
      directory: '/'
      schedule:
          interval: 'weekly'
      commit-message:
          prefix: 'chore(ci)'
